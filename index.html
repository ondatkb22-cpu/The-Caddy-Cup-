<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🐊 Swamp Classic V14.0 — Full Board Pro Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #05070a; --sf: #0d1117; --sf2: #161b22; --bd: #30363d;
  --tx: #c9d1d9; --tx2: #8b949e; --grn: #238636; --red: #da3633;
  --gld: #d29922; --pur: #8957e5; --cyan: #388bfd; --f: 'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--tx); font-family: var(--f); font-size: 13px; line-height: 1.5; padding: 15px; }
.app { max-width: 1500px; margin: 0 auto; display: flex; flex-direction: column; height: calc(100vh - 30px); }
header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid var(--bd); padding-bottom: 15px; margin-bottom: 15px; }
h1 { font-size: 24px; font-weight: 800; color: #fff; letter-spacing: -1px; }
.meta { text-align: right; color: var(--tx2); font-size: 10px; text-transform: uppercase; }

.tabs { display: flex; gap: 4px; margin-bottom: 15px; background: var(--sf); padding: 4px; border-radius: 8px; }
.tab { flex: 1; background: transparent; border: none; color: var(--tx2); padding: 12px; cursor: pointer; font-weight: 700; border-radius: 6px; transition: 0.2s; font-size: 11px; }
.tab.on { background: var(--sf2); color: var(--cyan); box-shadow: 0 0 10px rgba(56,139,253,0.1); }

.panel { flex: 1; display: none; flex-direction: column; overflow: hidden; }
.panel.on { display: flex; }

.toolbar { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; overflow-x: auto; padding-bottom: 5px; }
input { background: var(--sf); border: 1px solid var(--bd); color: #fff; padding: 12px; outline: none; width: 280px; border-radius: 8px; font-size: 16px; font-family: var(--f); }
.chip { background: var(--sf); border: 1px solid var(--bd); color: var(--tx2); padding: 10px 14px; border-radius: 20px; cursor: pointer; font-size: 10px; font-weight: 700; white-space: nowrap; }
.chip.on { background: rgba(56, 139, 253, 0.1); color: var(--cyan); border-color: var(--cyan); }

.table-container { flex: 1; overflow: auto; border: 1px solid var(--bd); border-radius: 8px; background: var(--sf); -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; min-width: 1000px; }
th { position: sticky; top: 0; background: var(--sf2); padding: 14px 10px; text-align: center; border-bottom: 2px solid var(--bd); z-index: 2; cursor: pointer; color: var(--tx2); font-size: 11px; }
th:first-child { text-align: left; left: 0; z-index: 3; background: var(--sf2); }
th.act { color: var(--cyan); }
td { padding: 12px 10px; border-bottom: 1px solid var(--bd); text-align: center; font-size: 12px; }
td:first-child { text-align: left; position: sticky; left: 0; background: var(--sf); z-index: 1; font-weight: 700; color: #fff; border-right: 1px solid var(--bd); }

.badge { padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 800; display: inline-block; }
.b-gld { background: rgba(210,153,34,0.15); color: var(--gld); border: 1px solid var(--gld); }
.b-cyan { background: rgba(56,139,253,0.15); color: var(--cyan); }
.b-red { background: rgba(218,54,51,0.15); color: var(--red); border: 1px solid var(--red); }
.b-pur { background: rgba(137,87,229,0.15); color: var(--pur); }

.opt-grid { display: grid; grid-template-columns: 1fr 380px; gap: 20px; height: 100%; }
.sidebar { background: var(--sf); border: 1px solid var(--bd); border-radius: 8px; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
.main-out { background: var(--sf2); border: 1px solid var(--bd); border-radius: 8px; padding: 20px; flex: 1; overflow-y: auto; position: relative; }

.card { background: var(--bg); border: 1px solid var(--bd); border-radius: 8px; padding: 15px; }
.btn { width: 100%; padding: 18px; border-radius: 8px; border: 1px solid var(--bd); background: var(--sf2); color: #fff; font-weight: 800; cursor: pointer; transition: 0.2s; font-family: var(--f); }
.btn.gpp { border-color: var(--pur); color: var(--pur); }
.btn.cash { border-color: var(--cyan); color: var(--cyan); }
.btn:active { transform: scale(0.98); }

.l-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed var(--bd); }
.val-lg { font-size: 16px; font-weight: 800; color: var(--cyan); }

@media (max-width: 900px) {
  .opt-grid { display: flex; flex-direction: column; overflow: visible; height: auto; }
  .sidebar { order: 1; }
  .main-out { order: 2; height: 600px; }
  .panel { height: auto; }
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div><h1>SWAMP CLASSIC V14.0</h1><div style="color:var(--tx2);font-size:11px">Engine: Full Board Vig-Adjusted Steam + Pro Knapsack</div></div>
    <div class="meta">${pool_data.length} Teams | 50K Cap</div>
  </header>

  <div class="tabs">
    <button class="tab on" onclick="setTab('pool')">📊 LIVE_ODDS_BOARD</button>
    <button class="tab" onclick="setTab('opt')">🔧 PRO_SOLVER</button>
  </div>

  <div id="pool" class="panel on">
    <div class="toolbar">
      <input type="text" id="srch" placeholder="🔍 Filter Teams..." oninput="render()">
      <div class="chip on" data-f="all">ALL_TEAMS</div>
      <div class="chip" data-f="steam">🔥 TOP_STEAM_MOVERS</div>
      <div class="chip" data-f="value">💰 DELTA_FIT_VALUE</div>
    </div>
    <div class="table-container">
      <table>
        <thead id="thd"></thead>
        <tbody id="tb"></tbody>
      </table>
    </div>
  </div>

  <div id="opt" class="panel">
    <div class="opt-grid">
      <div class="sidebar">
        <div class="card">
          <div style="font-size:10px; color:var(--tx2); margin-bottom:10px;">SOLVER CONSTRAINTS</div>
          <div style="font-size:12px; color:#fff">Limit: 6 Teams<br>Budget: $49k-$50k</div>
        </div>
        <button class="btn gpp" onclick="solve('steam')">🔥 GENERATE LIVE-STEAM LINEUP</button>
        <button class="btn" style="color:var(--gld); border-color:var(--gld)" onclick="solve('pro')">🏆 GENERATE PURE BASELINE (V12)</button>
      </div>
      <div class="main-out" id="lineup-out">
        <div style="display:flex; height:100%; align-items:center; justify-content:center; color:var(--tx2); text-align:center; padding:30px;">
          Select strategy to initialize Knapsack Solver.
        </div>
      </div>
    </div>
  </div>
</div>

let SC='steam', SA=false, CF='all';
let currentLineup = null;

function setTab(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  event.currentTarget.classList.add('on');
}

document.querySelectorAll('.chip').forEach(c=>{
  c.onclick = (e)=>{
    document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
    e.target.classList.add('on');
    CF = e.target.dataset.f;
    render();
  };
});

function render(){
  const q = document.getElementById('srch').value.toLowerCase();
  let d = RAW_TEAMS.filter(p=>{
    if(q && !p.tm.toLowerCase().includes(q)) return false;
    if(CF==='steam' && p.steam <= 0.002) return false;
    if(CF==='value' && p.cur_odds && p.win_eq < (100/(p.cur_odds+100)*100)) return false; // Basic delta fit logic for UI
    return true;
  });
  d.sort((a,b)=>SA?(a[SC]-b[SC]):(b[SC]-a[SC]));
  
  const h = ['tm','sal','cur_odds','win_eq','steam','syn','p99'];
  document.getElementById('thd').innerHTML = '<tr>'+h.map(k=>`<th class="${SC===k?'act':''}" onclick="sort('${k}')">${k.toUpperCase()}</th>`)+'</tr>';
  
  document.getElementById('tb').innerHTML = d.map(p=>{
    let b = '';
    if(p.steam > 0.005) b='<span class="badge b-gld">🔥 MASSIVE STEAM</span>';
    else if(p.steam > 0) b='<span class="badge b-cyan">📈 RISING</span>';
    else if(p.steam < -0.005) b='<span class="badge b-red">📉 DRIFTING</span>';
    
    return `<tr>
      <td>${p.tm}<br>${b}</td>
      <td class="val-lg" style="font-size:12px">$${p.sal}</td>
      <td style="color:#fff">${p.cur_odds ? '+'+p.cur_odds : 'N/A'}</td>
      <td>${p.win_eq.toFixed(2)}%</td>
      <td style="color:${p.steam>0?'var(--gld)':(p.steam<0?'var(--red)':'var(--tx2)')}; font-weight:700">${(p.steam*100).toFixed(2)}%</td>
      <td class="${p.syn>0?'g':(p.syn<0?'r':'')}" style="font-weight:700">${p.syn>0?'+':''}${p.syn}</td>
      <td style="color:var(--pur); font-weight:800">${p.p99.toFixed(2)}</td>
    </tr>`;
  }).join('');
}

function sort(k){ SA=SC===k?!SA:false; SC=k; render(); }

function solve(type){
  const maxW=500, minW=490;
  let metric = type === 'steam' ? 'gpp_obj_steam' : 'gpp_obj';
  
  const items = RAW_TEAMS.map(p=>({...p, w:parseInt(p.sal)/100, v:p[metric]}));
  let dp = Array.from({length:7},()=>Array(maxW+1).fill(null));
  dp[0][0] = {val:0, line:[]};
  
  for(let it of items){
    for(let k=5;k>=0;k--){
      for(let w=maxW-it.w;w>=0;w--){
        if(dp[k][w]){
          let nV = dp[k][w].val + it.v;
          let nW = w + it.w;
          if(!dp[k+1][nW] || dp[k+1][nW].val < nV) dp[k+1][nW]={val:nV, line:[...dp[k][w].line, it]};
        }
      }
    }
  }
  
  let best=null;
  for(let w=minW;w<=maxW;w++) if(dp[6][w]&&(!best||dp[6][w].val>best.val)) best=dp[6][w];
  
  if(best){
    currentLineup = best.line;
    const tSal = currentLineup.reduce((s,i)=>s+parseInt(i.sal),0);
    const winEq = currentLineup.reduce((s,i)=>s+i.win_eq,0);
    const tSteam = currentLineup.reduce((s,i)=>s+(i.steam*100),0);
    
    document.getElementById('lineup-out').innerHTML = `
      <div style="margin-bottom:20px; border-bottom:1px solid var(--bd); padding-bottom:15px;">
        <h2 style="color:var(--cyan)">${type.toUpperCase()} OPTIMAL ROSTER</h2>
        <div style="font-size:12px; color:var(--tx2)">SALARY: $${tSal} | WIN EQ: ${winEq.toFixed(2)}% | SHIFT: ${tSteam>0?'+':''}${tSteam.toFixed(2)}%</div>
      </div>
      ${currentLineup.sort((a,b)=>parseInt(b.sal)-parseInt(a.sal)).map(i=>`
        <div class="l-item">
          <div><div style="font-weight:800; color:#fff">${i.tm}</div><div style="font-size:10px; color:var(--tx2)">STEAM: ${(i.steam*100).toFixed(2)}% | SYN: ${i.syn}</div></div>
          <div class="val-lg">$${i.sal}</div>
        </div>
      `).join('')}
    `;
  }
}

render();
</script>
